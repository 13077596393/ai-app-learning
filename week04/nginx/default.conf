server { # 定义一个 Nginx HTTP 服务
    listen 80; # 监听容器内部的 80 端口

    server_name localhost; # 本地开发阶段使用 localhost 作为服务名

    root /usr/share/nginx/html; # 指定前端静态文件所在目录

    index index.html; # 默认首页文件是 index.html

    client_max_body_size 50m; # 允许上传最大 50MB 文件，避免上传文档时被 Nginx 拦截

    location /docs { # 代理 FastAPI 的 Swagger 文档页面
        proxy_pass http://backend:8000/docs; # 转发到 backend 服务的 /docs
        proxy_set_header Host $host; # 保留原始 Host
        proxy_set_header X-Real-IP $remote_addr; # 传递客户端真实 IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # 传递代理链路 IP
        proxy_set_header X-Forwarded-Proto $scheme; # 传递原始协议
    }

    location /openapi.json { # 代理 FastAPI 的 OpenAPI JSON
        proxy_pass http://backend:8000/openapi.json; # 转发到 backend 服务的 /openapi.json
        proxy_set_header Host $host; # 保留原始 Host
        proxy_set_header X-Real-IP $remote_addr; # 传递客户端真实 IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # 传递代理链路 IP
        proxy_set_header X-Forwarded-Proto $scheme; # 传递原始协议
    }

    location /api/ { # 代理带 /api 前缀的后端接口请求
        rewrite ^/api/(.*)$ /$1 break; # 把 /api/users/me 转成 /users/me
        proxy_pass http://backend:8000; # 转发到 FastAPI 后端服务
        proxy_set_header Host $host; # 保留原始 Host
        proxy_set_header X-Real-IP $remote_addr; # 传递客户端真实 IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # 传递代理链路 IP
        proxy_set_header X-Forwarded-Proto $scheme; # 传递原始协议
        proxy_buffering off; # 关闭代理缓冲，方便 SSE 流式输出
        proxy_read_timeout 300s; # 增加读取超时时间，避免长任务接口过早断开
    }

    location ~ ^/(users|chat|knowledge-bases|konwledge-bases|documents|agent|project-spaces|rag|eval-cases|tasks)(/|$) { # 兼容旧前端直接请求后端原始路径
        proxy_pass http://backend:8000; # 直接转发到 FastAPI 后端
        proxy_set_header Host $host; # 保留原始 Host
        proxy_set_header X-Real-IP $remote_addr; # 传递客户端真实 IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # 传递代理链路 IP
        proxy_set_header X-Forwarded-Proto $scheme; # 传递原始协议
        proxy_buffering off; # 关闭代理缓冲，支持 SSE 或长连接
        proxy_read_timeout 300s; # 增加读取超时时间
    }

    location / { # 处理前端页面和静态资源
        try_files $uri $uri/ /index.html; # 优先找真实文件，找不到时返回 index.html
    }
}